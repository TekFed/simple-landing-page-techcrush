name: CI/CD - Landing Page to EC2

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Security: Least permissions
permissions:
  contents: read

jobs:
  # ==================== CI JOB ====================
  ci:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run HTMLHint
        run: npx htmlhint "**/*.html"

  # ==================== CD JOB ====================
  deploy:
    name: Deploy to EC2
    needs: ci                    # Only deploy if validation passes
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          TARGET_DIR: ${{ secrets.TARGET_DIR }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.pem' \
            ./ $EC2_USER@$EC2_HOST:$TARGET_DIR/

          echo "✅ Deployment to EC2 completed successfully!"