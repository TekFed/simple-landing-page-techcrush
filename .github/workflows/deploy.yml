name: CI/CD — Build, Test, Deploy to EC2

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    name: Install dependencies and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Build project
        run: python scripts/build.py

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifact
          path: dist

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-artifact
          path: dist

      - name: Run test suite
        run: python scripts/check-dist.py

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-artifact
          path: dist

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy built site to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          TARGET_DIR: ${{ secrets.TARGET_DIR }}
        run: |
          echo "🚀 Starting deployment..."
          echo "Target: $EC2_USER@$EC2_HOST:$TARGET_DIR"

          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "echo '✅ SSH connected as $(whoami)' && mkdir -p $TARGET_DIR"

          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.pem' \
            --exclude='node_modules' \
            dist/ $EC2_USER@$EC2_HOST:$TARGET_DIR/

          echo "✅ Deployment completed successfully!"
          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "ls -la $TARGET_DIR | head -10"
