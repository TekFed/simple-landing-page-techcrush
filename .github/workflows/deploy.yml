name: Deploy Landing Page to EC2

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Security best practice
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    if: github.ref == 'refs/heads/master'    # Only deploy on push to main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          TARGET_DIR: ${{ secrets.TARGET_DIR }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.pem' \
            ./ $EC2_USER@$EC2_HOST:$TARGET_DIR/

          echo "✅ Deployment to EC2 completed successfully!"